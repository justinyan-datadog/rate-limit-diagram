<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Monthly Quotas & Burst Limit Upgrade Products</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #fff; }
    #root { width: 100vw; height: 100vh; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.3.1",
      "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
      "@excalidraw/excalidraw": "https://esm.sh/@excalidraw/excalidraw@0.18.0?bundle-deps"
    }
  }
  </script>
  <script type="module">
    import React from "react";
    import { createRoot } from "react-dom/client";
    import { Excalidraw } from "@excalidraw/excalidraw";

    const resp = await fetch("./diagram.excalidraw");
    const data = await resp.json();

    const elements = (data.elements || []).filter(e => !e.isDeleted);
    const appState = {
      ...data.appState,
      viewModeEnabled: true,
      zenModeEnabled: true,
      theme: "light",
    };

    function App() {
      return React.createElement(
        "div",
        { style: { width: "100vw", height: "100vh" } },
        React.createElement(Excalidraw, {
          initialData: { elements, appState, files: data.files || {} },
          viewModeEnabled: true,
          zenModeEnabled: true,
          theme: "light",
        })
      );
    }

    createRoot(document.getElementById("root")).render(React.createElement(App));
  </script>
</body>
</html>
