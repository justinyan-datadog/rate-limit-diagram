<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Monthly Quotas & Burst Limit Upgrade Products</title>
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@excalidraw/excalidraw@0.18.0/dist/browser/dev/index.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #root { width: 100%; height: 100%; overflow: hidden; background: #fff; }
    .loading { display: flex; align-items: center; justify-content: center; height: 100vh; font-family: system-ui; color: #64748b; font-size: 18px; }
  </style>
</head>
<body>
  <div id="root"><div class="loading">Loading diagram…</div></div>
  <script>
    (async function() {
      try {
        const resp = await fetch("./diagram.excalidraw");
        const data = await resp.json();
        const elements = (data.elements || []).filter(function(e) { return !e.isDeleted; });
        const appState = Object.assign({}, data.appState, {
          viewModeEnabled: true,
          zenModeEnabled: true,
          theme: "light"
        });

        var h = React.createElement;
        var root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(
          h("div", { style: { width: "100vw", height: "100vh" } },
            h(ExcalidrawLib.Excalidraw, {
              initialData: { elements: elements, appState: appState, files: data.files || {} },
              viewModeEnabled: true,
              zenModeEnabled: true,
              theme: "light"
            })
          )
        );
      } catch (err) {
        document.getElementById("root").innerHTML =
          '<div class="loading">Failed to load diagram: ' + err.message + '</div>';
      }
    })();
  </script>
</body>
</html>
